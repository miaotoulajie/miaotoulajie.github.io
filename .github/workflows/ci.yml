name: PR Quality Check

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://zdbvsqdzzhtkcgxkbjoj.supabase.co
      VITE_SUPABASE_ANON_KEY: sb_publishable_p93TYVb1pJOUH-Ty-ymnPQ_iGtzTedz
      SITE_URL: https://miaotoulajie.github.io
      VITE_BASE_PATH: /

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate:content

      - name: Generate sitemap
        run: npm run generate:sitemap

      - name: Build
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: npm run build
